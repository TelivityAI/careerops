name: Bug report
description: Something broken in the CareerOps dashboard
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: 1. … 2. … 3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: "Browser, OS, self-hosted vs demo"
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Do **not** paste API keys, resumes, or private job data.
